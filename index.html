<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoTrade Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body class="dark-theme">
    <nav class="navbar">
        <div class="logo">ALGOTRADE <span>SYSTEM</span></div>
        <div class="status-badge">
            <span class="dot pulse"></span> <span id="account-count">0</span> TERMINALS ACTIVE
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Account <span>Monitoring</span></h1>
            <p>Real-time data synchronization with Supabase via MT4 Expert Advisor.</p>
        </header>

        <div id="accounts-grid" class="accounts-grid">
            <div class="loading-state">Connecting to terminal...</div>
        </div>
    </main>

    <div id="chartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Growth Chart</h2>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body" style="height: 400px;"> <canvas id="growthChart"></canvas>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
